name: Deploy Docs to GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify docs directory
        run: |
          echo "📂 Checking docs/ directory..."
          echo "=== Root-level .md files ==="
          find docs -maxdepth 1 -name "*.md" | sort
          echo ""
          echo "=== All .md files (recursive) ==="
          find docs -name "*.md" | sort
          echo ""
          echo "📊 Total markdown files: $(find docs -name '*.md' | wc -l)"

      - name: Clone Wiki repository
        env:
          WIKI_DEPLOY_TOKEN: ${{ secrets.WIKI_DEPLOY_TOKEN }}
        run: |
          REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          if [ -z "$WIKI_DEPLOY_TOKEN" ]; then
            echo "::error::WIKI_DEPLOY_TOKEN secret is not set. Please add a Personal Access Token (classic) with 'repo' scope."
            echo "::notice::Go to Settings > Secrets and variables > Actions > New repository secret"
            echo "::notice::Name: WIKI_DEPLOY_TOKEN, Value: ghp_xxx (classic PAT with repo scope)"
            exit 1
          fi

          WIKI_URL="https://${WIKI_DEPLOY_TOKEN}@github.com/${REPO_OWNER}/${REPO_NAME}.wiki.git"
          echo "Cloning wiki from: ${REPO_OWNER}/${REPO_NAME}.wiki.git"
          git clone "$WIKI_URL" wiki-repo
          echo "✅ Wiki repository cloned"

      - name: Sync docs to Wiki
        run: |
          set -e  # 任何命令失败立即退出
          cd wiki-repo

          echo "=== Before cleanup ==="
          find . -mindepth 1 -not -name '.git' -not -path './.git/*' | sort || true

          # 保留 .git 目录，清空其他内容
          find . -mindepth 1 -not -name '.git' -not -path './.git/*' -delete
          echo "✅ Wiki repo cleaned"

          # 使用 rsync 风格的显式复制，更可靠
          echo "📋 Copying docs/ to wiki-repo..."
          
          # 复制根级 .md 文件
          cp ../docs/*.md ./ 2>/dev/null || echo "⚠️ No root .md files to copy"
          
          # 复制各子目录（逐一复制，便于排查问题）
          for dir in user-guide features development architecture; do
            if [ -d "../docs/$dir" ]; then
              mkdir -p "$dir"
              cp ../docs/$dir/*.md "$dir/" 2>/dev/null || echo "⚠️ No .md files in $dir/"
              echo "  📁 $dir/ → $(ls "$dir"/*.md 2>/dev/null | wc -l) files"
            else
              echo "  ⚠️ ../docs/$dir not found in source"
            fi
          done

          # 确保 Home.md 存在（Wiki 首页）
          if [ ! -f "Home.md" ]; then
            echo "# TimeWrite Wiki" > Home.md
            echo "⚠️ Home.md was missing, created placeholder"
          fi

          # 确保 _Sidebar.md 存在
          if [ ! -f "_Sidebar.md" ]; then
            echo "⚠️ _Sidebar.md not found, sidebar won't render"
          fi

          echo ""
          echo "=== Files to be published ==="
          find . -name "*.md" -not -path './.git/*' | sort
          echo "---"
          TOTAL=$(find . -name '*.md' -not -path './.git/*' | wc -l)
          echo "📊 Total: $TOTAL markdown files"
          
          if [ "$TOTAL" -lt 5 ]; then
            echo "::warning::Only $TOTAL .md files found, expected 22+. Possible copy failure!"
          fi

      - name: Commit and push to Wiki
        run: |
          set -e
          cd wiki-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          echo "=== Changes to commit ==="
          git diff --cached --stat || true

          if git diff --cached --quiet; then
            echo "ℹ️ No changes to Wiki, skipping push."
          else
            COMMIT_MSG="docs: sync wiki from main branch (${{ github.sha }})

          Source: ${{ github.repository }}@${{ github.ref_name }}
          Triggered by: ${{ github.event.head_commit.message }}"

            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ Wiki published successfully!"
            echo "🔗 View at: https://github.com/${{ github.repository }}/wiki"
          fi
