name: Deploy Docs to GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify source docs directory
        run: |
          echo "📂 Scanning docs/ source directory..."
          echo ""
          echo "=== Root-level .md files ==="
          find docs -maxdepth 1 -name "*.md" | sort
          echo ""
          echo "=== All .md files (recursive) ==="
          find docs -name "*.md" | sort
          echo ""
          SOURCE_COUNT=$(find docs -name '*.md' | wc -l)
          echo "📊 Total: $SOURCE_COUNT markdown files in source"
          echo "source_count=$SOURCE_COUNT" >> $GITHUB_ENV

          if [ "$SOURCE_COUNT" -lt 10 ]; then
            echo "::error::Source docs/ has only $SOURCE_COUNT .md files, expected 22+"
            exit 1
          fi

      - name: Clone Wiki repository
        env:
          WIKI_DEPLOY_TOKEN: ${{ secrets.WIKI_DEPLOY_TOKEN }}
        run: |
          REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          if [ -z "$WIKI_DEPLOY_TOKEN" ]; then
            echo "::error::WIKI_DEPLOY_TOKEN secret is not set."
            echo "::notice::Go to Settings > Secrets and variables > Actions > New repository secret"
            echo "::notice::Create a Personal Access Token (classic) with 'repo' scope"
            exit 1
          fi

          WIKI_URL="https://${WIKI_DEPLOY_TOKEN}@github.com/${REPO_OWNER}/${REPO_NAME}.wiki.git"
          echo "Cloning wiki repo..."
          git clone "$WIKI_URL" wiki-repo
          echo "✅ Wiki cloned"

          echo ""
          echo "=== Current Wiki state (what's already deployed) ==="
          cd wiki-repo
          git ls-files | sort
          EXISTING=$(git ls-files '*.md' | wc -l)
          echo "---"
          echo "📊 Currently deployed: $EXISTING .md files in wiki repo"
          echo "existing_count=$EXISTING" >> $GITHUB_ENV

      - name: Sync docs to Wiki (flatten subdirectories)
        run: |
          set -euo pipefail
          cd wiki-repo

          echo "=== Cleaning wiki repo (preserving .git) ==="
          find . -mindepth 1 -not -name '.git' -not -path './.git/*' -delete
          echo "✅ Cleaned"

          echo ""
          echo "📋 Copying docs to wiki (flat naming)..."

          # ---------- 1. 复制根级 .md 文件 ----------
          for f in ../docs/*.md; do
            [ -f "$f" ] || continue
            cp "$f" ./
            echo "  ✅ $(basename "$f")"
          done

          # ---------- 2. 子目录 → 扁平化文件名 ----------
          # GitHub Wiki 不支持子目录页面，所以 user-guide/quick-start.md
          # 必须在 wiki 根级命名为 user-guide-quick-start.md
          SUBDIRS="user-guide features development architecture"
          TOTAL_FLAT=0
          for dir in $SUBDIRS; do
            SRC_DIR="../docs/$dir"
            if [ ! -d "$SRC_DIR" ]; then
              echo "  ⚠️ $dir/ → source not found, skipping"
              continue
            fi
            COUNT=0
            for f in "$SRC_DIR"/*.md; do
              [ -f "$f" ] || continue
              flat_name="${dir}-$(basename "$f")"
              cp "$f" "./${flat_name}"
              COUNT=$((COUNT + 1))
            done
            echo "  📁 $dir/ → $COUNT files (prefix: $dir-)"
            TOTAL_FLAT=$((TOTAL_FLAT + COUNT))
          done
          echo "  🔢 Total flattened files: $TOTAL_FLAT"

          # ---------- 3. 修正所有 Markdown 内部链接 ----------
          # 将 [text](subdir/page) 改为 [text](subdir-page)
          echo ""
          echo "🔧 Fixing internal wiki links (flattening paths)..."
          for dir in $SUBDIRS; do
            # 只替换 markdown 链接格式中的路径，不影响其他内容
            sed -i "s|(\(${dir}\)/|(\1-|g" ./*.md
            echo "  🔗 $(basename "$dir")/ → $(basename "$dir")-"
          done

          # ---------- 4. 删除空的子目录（如果有残留） ----------
          for dir in $SUBDIRS; do
            [ -d "$dir" ] && rm -rf "$dir"
          done

          # ---------- 最终校验 ----------
          echo ""
          echo "=== Files staged for deployment ==="
          find . -name "*.md" -not -path './.git/*' | sort
          FINAL_COUNT=$(find . -name '*.md' -not -path './.git/*' | wc -l)
          echo "---"
          echo "📊 Final: $FINAL_COUNT .md files (source had ${{ env.source_count }})"
          echo "final_count=$FINAL_COUNT" >> $GITHUB_ENV

          if [ "$FINAL_COUNT" -lt 10 ]; then
            echo "::error::Only $FINAL_COUNT files after copy, expected 22+!"
            exit 1
          fi

      - name: Commit and push to Wiki
        run: |
          set -euo pipefail
          cd wiki-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 总是添加所有文件
          git add -A

          echo ""
          echo "=== Changed files ==="
          if git diff --cached --quiet; then
            echo "ℹ️ Working tree matches HEAD — force-pushing anyway to ensure consistency"
            git commit --allow-empty -m "docs: force sync wiki from main (${{ github.sha }})"
          else
            git diff --cached --stat
            COMMIT_MSG="docs: sync wiki from main (${{ github.sha }})

          Source: ${{ github.repository }}@${{ github.ref_name }}
          Triggered by: ${{ github.event.head_commit.message }}"
            git commit -m "$COMMIT_MSG"
          fi

          # 强制推送确保 wiki 与 docs 一致
          git push origin HEAD:master
          echo "✅ Wiki pushed successfully!"
          echo "🔗 View at: https://github.com/${{ github.repository }}/wiki"

      - name: Verify deployed pages
        run: |
          echo "⏳ Waiting 10s for GitHub to process the wiki push..."
          sleep 10

          WIKI_BASE="https://github.com/${{ github.repository }}/wiki"
          FAILED_PAGES=0

          echo ""
          echo "🔍 Verifying wiki pages..."

          check_page() {
            local page="$1"
            local url="${WIKI_BASE}/${page}"
            local status=$(curl -s -o /dev/null -w "%{http_code}" -L "$url" || echo "000")
            if [ "$status" = "200" ]; then
              echo "  ✅ $page"
            else
              echo "  ❌ $page → HTTP $status"
              FAILED_PAGES=$((FAILED_PAGES + 1))
            fi
          }

          # 验证首页和几个关键子页面（使用扁平化命名）
          check_page "Home"
          check_page "user-guide-quick-start"
          check_page "user-guide-chapter-editing"
          check_page "features-feature-list"
          check_page "architecture-overview"
          check_page "development-project-structure"
          check_page "FAQ"
          check_page "CHANGELOG"

          if [ "$FAILED_PAGES" -gt 0 ]; then
            echo ""
            echo "::warning::$FAILED_PAGES wiki pages returned non-200. Check if GitHub is still processing (may need 1-2 min)."
          else
            echo ""
            echo "🎉 All wiki pages are accessible!"
          fi
