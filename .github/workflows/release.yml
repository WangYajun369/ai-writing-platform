name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (e.g. 0.1.0)'
        required: true
        default: '0.6.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ===========================
  # macOS 构建 (Apple Silicon)
  # ===========================
  build-macos:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Apple Certificate
        if: ${{ env.APPLE_CERTIFICATE_BASE64 != '' }}
        id: import-cert
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify signing identity
        if: ${{ env.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          SIGN_ID="${{ secrets.APPLE_SIGNING_IDENTITY }}"
          if security find-identity -v -p codesigning | grep -q "$SIGN_ID"; then
            echo "SIGN_READY=true" >> "$GITHUB_ENV"
            echo "🔐 签名身份验证成功: $SIGN_ID"
          else
            echo "SIGN_READY=false" >> "$GITHUB_ENV"
            echo "⚠️ 签名身份未在 keychain 中找到，将跳过代码签名"
          fi

      - name: Build (macOS ARM64)
        run: |
          if [ "$SIGN_READY" = "true" ]; then
            export APPLE_SIGNING_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "🔐 使用 Apple 签名证书"
          else
            # 必须显式设为 "-"，否则 Tauri 会在 keychain 中自动寻找身份强行签名
            export APPLE_SIGNING_IDENTITY="-"
            echo "⚠️ 跳过代码签名（构建未签名版本）"
          fi
          pnpm tauri build --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Notarize macOS app
        if: ${{ env.APPLE_ID != '' }}
        run: |
          set -euo pipefail
          DMG_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)

          if [ -z "$DMG_PATH" ]; then
            echo "❌ 找不到 .dmg 文件"
            exit 1
          fi

          echo "📦 正在公证 $DMG_PATH ..."

          # 提交公证请求
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # 装订公证票据
          xcrun stapler staple "$DMG_PATH"

          echo "✅ 公证完成"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # ===========================
  # Windows 构建
  # ===========================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Windows)
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ===========================
  # 创建 GitHub Release
  # ===========================
  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies (for Tauri CLI)
        run: pnpm install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate latest.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          REPO="${{ github.repository }}"

          DMG=$(find artifacts/macos-dmg -name "*.dmg" | head -1)
          EXE=$(find artifacts/windows-exe -name "*.exe" | head -1)

          if [ -z "$DMG" ] || [ -z "$EXE" ]; then
            echo "❌ 找不到 DMG 或 EXE 文件"
            exit 1
          fi

          DMG_NAME=$(basename "$DMG")
          EXE_NAME=$(basename "$EXE")

          echo "DMG: $DMG_NAME"
          echo "EXE: $EXE_NAME"

          # 使用 Tauri CLI 对安装包签名，获取签名
          DMG_SIGNATURE=$(npx tauri signer sign -f "$DMG" 2>/dev/null | jq -r '.signature' || echo "")
          EXE_SIGNATURE=$(npx tauri signer sign -f "$EXE" 2>/dev/null | jq -r '.signature' || echo "")

          if [ -z "$DMG_SIGNATURE" ] || [ -z "$EXE_SIGNATURE" ]; then
            echo "⚠️  签名生成失败，请检查 TAURI_PRIVATE_KEY 是否正确配置"
            echo "将以无签名模式生成 latest.json（更新器将使用 pubkey 为空时的行为）"
          fi

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json << JSONEOF
          {
            "version": "${VERSION_NUM}",
            "notes": "See release notes at https://github.com/${REPO}/releases/tag/${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DMG_SIGNATURE}",
                "url": "https://github.com/${REPO}/releases/download/${VERSION}/${DMG_NAME}"
              },
              "windows-x86_64": {
                "signature": "${EXE_SIGNATURE}",
                "url": "https://github.com/${REPO}/releases/download/${VERSION}/${EXE_NAME}"
              }
            }
          }
          JSONEOF

          echo "✅ latest.json 已生成:"
          cat latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'TimeWrite ${{ github.ref_name }}'
          body: |
            ## 智写时光 TimeWrite ${{ github.ref_name }}

            跨平台小说创作工具

            ### 下载

            | 平台 | 安装包 |
            |------|--------|
            | 🍎 macOS (Apple Silicon) | `.dmg` |
            | 🪟 Windows | `.exe` |

            ### 安装说明

            **macOS**: 下载 `.dmg` 文件，双击打开后将 `TimeWrite.app` 拖入 `Applications` 文件夹。如果提示"已损坏"，请在终端执行：`xattr -cr /Applications/TimeWrite.app`
            **Windows**: 下载 `.exe` 安装包，双击运行安装向导。
          files: |
            artifacts/**/*
            latest.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
