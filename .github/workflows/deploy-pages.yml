name: Deploy Product Page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'product/**'
      - '.github/workflows/deploy-pages.yml'
  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同时只允许一个部署运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy
          cp -r product/* _deploy/
          # 将 landing-page.html 重命名为 index.html，作为站点首页
          mv _deploy/landing-page.html _deploy/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
