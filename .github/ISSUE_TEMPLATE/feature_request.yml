name: ✨ 功能请求
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出宝贵建议！请详细描述你的想法，帮助我们更好地理解你的需求。

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 请描述这个功能要解决什么问题？在什么场景下需要？
      placeholder: "例如：我经常需要同时编辑多篇文章，但当前只支持单篇编辑，来回切换很麻烦。"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你期望的功能是什么样的？请尽量详细描述
      placeholder: "例如：希望支持标签页式多文档编辑，类似 VS Code 的 Tab 栏。"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你是否考虑过其他替代方案？
      placeholder: "例如：也可以通过在左侧增加文档列表快速切换。"

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何你觉得相关的参考、截图或设计草图都可以放这里
